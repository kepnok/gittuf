name: gittuf transport

on:
  pull_request:
    paths:
      - "internal/git-remote-gittuf/**"
      - ".github/workflows/git-remote-gittuf.yml"

  push:
    branches: ["**"]
    paths:
      - "internal/git-remote-gittuf/**"
      - ".github/workflows/git-remote-gittuf.yml"

jobs:
  transport:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        handle: [http, ssh]
        scenario:
          - remote_has_policy
          - local_has_policy
          - divergent_policy

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: "1.26"

      - name: Build and install binaries
        run: |
          make just-install
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Configure Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global init.defaultBranch main

      - name: Setup test repos
        run: |
          mkdir /tmp/remote.git
          git init --bare /tmp/remote.git

          mkdir /tmp/local
          cd /tmp/local
          git init
          echo "hello" > file.txt
          git add .
          git commit -m "init"

      - name: Prepare scenario
        run: |
          if [ "${{ matrix.scenario }}" = "remote_has_policy" ]; then
            git clone /tmp/remote.git /tmp/temp
            cd /tmp/temp
            git commit --allow-empty -m "remote gittuf"
            git update-ref refs/gittuf/test HEAD
            git push origin refs/gittuf/test
          fi

          if [ "${{ matrix.scenario }}" = "local_has_policy" ]; then
            cd /tmp/local
            git commit --allow-empty -m "local gittuf"
            git update-ref refs/gittuf/test HEAD
          fi

          if [ "${{ matrix.scenario }}" = "divergent_policy" ]; then
            git clone /tmp/remote.git /tmp/temp
            cd /tmp/temp
            git commit --allow-empty -m "remote version"
            git update-ref refs/gittuf/test HEAD
            git push origin refs/gittuf/test

            cd /tmp/local
            git commit --allow-empty -m "local version"
            git update-ref refs/gittuf/test HEAD
          fi

      - name: Start Smart HTTP server
        if: matrix.handle == 'http'
        run: |
          sudo apt-get update
          sudo apt-get install -y lighttpd fcgiwrap

          sudo mkdir -p /usr/lib/cgi-bin

          sudo tee /usr/lib/cgi-bin/git-http-backend > /dev/null << 'EOF'
          #!/bin/bash
          export GIT_PROJECT_ROOT=/tmp
          export GIT_HTTP_EXPORT_ALL=1
          exec $(git --exec-path)/git-http-backend
          EOF

          sudo chmod +x /usr/lib/cgi-bin/git-http-backend

          sudo lighty-enable-mod cgi
          sudo lighty-enable-mod alias

          sudo tee /etc/lighttpd/conf-available/99-git.conf > /dev/null << 'EOF'
          alias.url += ( "/git" => "/usr/lib/cgi-bin/git-http-backend" )
          cgi.assign = ( "" => "" )
          EOF

          sudo lighty-enable-mod git || true
          sudo ln -sf /etc/lighttpd/conf-available/99-git.conf /etc/lighttpd/conf-enabled/99-git.conf

          sudo systemctl restart fcgiwrap
          sudo systemctl restart lighttpd

          sleep 3
          curl -I http://127.0.0.1/git

      - name: Setup SSH server
        if: matrix.handle == 'ssh'
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server

          sudo service ssh start

          mkdir -p ~/.ssh
          ssh-keygen -t rsa -N "" -f ~/.ssh/id_rsa

          cat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

          {
            echo "Host localhost"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile /dev/null"
            echo "  BatchMode yes"
          } >> ~/.ssh/config

      - name: Run clone/fetch/push
        run: |
          set -euxo pipefail

          export GIT_TERMINAL_PROMPT=0
          export GIT_TRACE=1
          export GIT_CURL_VERBOSE=1

          cd /tmp

          if [ "${{ matrix.handle }}" = "http" ]; then
            URL="gittuf::http://127.0.0.1/cgi-bin/git-http-backend/remote.git"
          else
            export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes"
            URL="gittuf::localhost:/tmp/remote.git"
          fi

          echo "Using URL: $URL"

          timeout 60 git clone --progress "$URL" cloned

          cd /tmp/local
          git remote add origin /tmp/remote.git || true

          echo "trigger new packfile" >> file.txt
          git commit -am "force fetch"
          timeout 60 git push origin main

          cd /tmp/cloned

          timeout 60 git fetch --progress
          timeout 60 git pull --progress || true

          echo "change" >> file.txt
          git add .
          git commit -m "update"

          timeout 60 git push origin HEAD || true

      - name: Verify gittuf refs
        run: |
          cd /tmp/cloned

          echo "Checking gittuf refs..."
          git show-ref

          git show-ref | grep refs/gittuf || \
            (echo "Missing gittuf refs" && exit 1)

          echo "gittuf refs found"